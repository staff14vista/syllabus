<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Management - Core Java</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/content-protection.js"></script>
    <style>
        @media (max-width: 640px) {
            .table-container {
                -webkit-overflow-scrolling: touch;
            }
        }

        tr:hover {
            background-color: #f9fafb;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-gray-50 via-blue-50 to-gray-100 min-h-screen py-4 sm:py-8 px-2 sm:px-4">
    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden">
        <!-- Title Section -->
        <div
            class="bg-gradient-to-r from-yellow-400 via-yellow-300 to-yellow-400 border-b-4 border-yellow-600 py-4 sm:py-6 px-4 sm:px-6">
            <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-center text-gray-900 leading-tight">
                Distribution of Syllabus for Core Java
            </h1>
        </div>

        <!-- Home Button -->
        <div class="bg-white border-b border-gray-200 px-4 sm:px-6 py-3 flex justify-end">
            <a href="../index.html"
                class="inline-flex items-center gap-2 text-xs sm:text-sm font-semibold text-blue-700 bg-blue-100 hover:bg-blue-200 px-4 py-2 rounded-lg transition-colors duration-200 shadow-sm">
                <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7m-9 2v8a2 2 0 002 2h2a2 2 0 002-2v-8m5 0l2 2" />
                </svg>
                Home
            </a>
        </div>

        <!-- Navigation Section -->
        <div class="bg-gradient-to-r from-blue-50 to-indigo-50 border-b-2 border-blue-200 py-4 sm:py-6 px-4 sm:px-6">
            <h2 class="text-lg sm:text-xl font-bold text-center text-gray-800 mb-4">Quick Access to Lesson Plans</h2>
            <div class="grid grid-cols-2 gap-4 max-w-lg mx-auto">
                <a href="Java.html"
                    class="bg-white hover:bg-amber-100 border-2 border-amber-300 rounded-lg px-3 py-2 sm:px-4 sm:py-3 text-center text-xs sm:text-sm font-semibold text-gray-800 transition-all duration-200 shadow-sm hover:shadow-md hover:scale-105">
                    Core Java
                </a>
                <a href="MySQL.html"
                    class="bg-white hover:bg-blue-100 border-2 border-blue-300 rounded-lg px-3 py-2 sm:px-4 sm:py-3 text-center text-xs sm:text-sm font-semibold text-gray-800 transition-all duration-200 shadow-sm hover:shadow-md hover:scale-105">
                    MySQL
                </a>
            </div>
        </div>

        <!-- Table Section -->
        <div class="overflow-x-auto table-container">
            <table class="w-full border-collapse">
                <thead class="sticky top-0 z-10">
                    <tr>
                        <th
                            class="bg-gradient-to-r from-gray-900 to-gray-800 text-white font-bold text-xs sm:text-sm py-3 px-2 sm:px-4 border-b-2 border-gray-700 text-center shadow-lg">
                            Subjects
                        </th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <tr class="hover:bg-blue-50 transition-colors duration-150">
                        <td class="py-3 px-2 sm:px-4 font-semibold text-center text-xs sm:text-sm text-gray-800">Core Java</td>
                    </tr>
                    <tr class="hover:bg-blue-50 transition-colors duration-150">
                        <td class="py-3 px-2 sm:px-4 font-semibold text-center text-xs sm:text-sm text-gray-800">MySQL</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Back to Top / Navigation Footer -->
        <div class="bg-gradient-to-r from-gray-100 to-gray-200 py-3 px-4 sm:px-6 border-t-2 border-gray-300">
            <div class="text-center">
                <p class="text-xs sm:text-sm text-gray-600 mb-2">Use the Quick Access menu above to view detailed lesson
                    plans</p>
                <a href="#" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;"
                    class="inline-block text-xs sm:text-sm font-semibold text-blue-600 hover:text-blue-800 hover:underline transition-colors duration-200">
                    ↑ Back to Top
                </a>
            </div>
        </div>
    </div>
</body>

</html>
